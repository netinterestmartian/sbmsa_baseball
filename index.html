<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>7u Midget Baseball — SBMSA Spring '26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg2:      #f5f5f3;
    --bg3:      #eeece6;
    --text:     #1a1a18;
    --text2:    #6b6b67;
    --text3:    #9b9b97;
    --border:   rgba(0,0,0,0.12);
    --border2:  rgba(0,0,0,0.22);
    --radius:   8px;
    --radius-lg:12px;
    --font:     system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #1a1a18;
      --bg2:    #252523;
      --bg3:    #2e2e2b;
      --text:   #f0efeb;
      --text2:  #9b9b97;
      --text3:  #6b6b67;
      --border: rgba(255,255,255,0.12);
      --border2:rgba(255,255,255,0.22);
    }
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 1.5rem 1rem; max-width: 900px; margin: 0 auto; }

  h1 { font-size: 22px; font-weight: 500; }
  .subtitle { font-size: 14px; color: var(--text2); margin-top: 4px; margin-bottom: 1.25rem; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .sc { background: var(--bg2); border-radius: var(--radius); padding: .9rem 1rem; }
  .sc .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .sc .val { font-size: 22px; font-weight: 500; }

  .top-tabs { display: flex; border-bottom: .5px solid var(--border); margin-bottom: 1.5rem; }
  .top-tab  { padding: 9px 16px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font); }
  .top-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .top-tab:hover:not(.active) { color: var(--text); }

  .div-tabs { display: flex; gap: 6px; border-bottom: .5px solid var(--border); margin-bottom: 1.25rem; }
  .div-tab  { padding: 7px 13px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font); }
  .div-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .div-tab:hover:not(.active) { color: var(--text); }

  .sec-label { font-size: 12px; font-weight: 500; color: var(--text2); margin: 1.25rem 0 .75rem; padding-bottom: 5px; border-bottom: .5px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }

  .tbl-wrap { overflow-x: auto; }
  table.t { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 540px; }
  table.t th { padding: 7px 6px; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; border-bottom: .5px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; text-align: center; }
  table.t th.l { text-align: left; }
  table.t th:hover, table.t th.s { color: var(--text); }
  table.t td { padding: 8px 6px; border-bottom: .5px solid var(--border); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  table.t td.l { text-align: left; }
  table.t tr:last-child td { border-bottom: none; }
  table.t tr:hover td { background: var(--bg2); }

  .tlink { cursor: pointer; color: var(--text); border-bottom: .5px solid var(--border2); }
  .tlink:hover { color: #185FA5; border-bottom-color: #185FA5; }

  .pb { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 500; }
  .p1 { background: #faeeda; color: #854f0b; }
  .p2 { background: #d3d1c7; color: #444441; }
  .p3 { background: #f5c4b3; color: #993c1d; }
  .pn { background: transparent; color: var(--text2); }

  .sw { color: #3b6d11; font-size: 12px; }
  .sl { color: #a32d2d; font-size: 12px; }
  .dp { color: #3b6d11; font-weight: 500; }
  .dn { color: #a32d2d; font-weight: 500; }
  .dz { color: var(--text2); }

  .div-pill { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; display: inline-block; }
  .ds { background: #E6F1FB; color: #0C447C; }
  .dk { background: #E1F5EE; color: #085041; }
  .dy { background: #EEEDFE; color: #3C3489; }

  .tier-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; display: inline-block; }
  .t1 { background: #eaf3de; color: #3b6d11; }
  .t2 { background: #e6f1fb; color: #0c447c; }
  .t3 { background: #faeeda; color: #854f0b; }
  .t4 { background: #fcebeb; color: #a32d2d; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: var(--text2); }
  .filter-row select { font-size: 13px; padding: 5px 10px; border: .5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--font); cursor: pointer; }

  .week-hdr { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; padding: 9px 12px 5px; background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; margin-top: 12px; border: .5px solid var(--border); border-bottom: none; }
  .game-row { display: grid; grid-template-columns: 90px 1fr 36px 1fr 90px; gap: 6px; align-items: center; padding: 8px 12px; border: .5px solid var(--border); border-top: none; font-size: 13px; }
  .game-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .game-row:hover { background: var(--bg2); }
  .gtime { font-size: 12px; color: var(--text2); }
  .gdate { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .gscore { font-size: 14px; font-weight: 500; text-align: center; }
  .gpend { font-size: 12px; color: var(--text2); text-align: center; }
  .gloc { font-size: 11px; color: var(--text2); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .info-box { background: var(--bg2); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 13px; color: var(--text2); line-height: 1.6; }
  .info-box strong { color: var(--text); font-weight: 500; }

  .team-card { background: var(--bg); border: .5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .tc-back { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; margin-bottom: 1.25rem; border: none; background: transparent; font-family: var(--font); padding: 0; }
  .tc-back:hover { color: var(--text); }
  .tc-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: .5px solid var(--border); }
  .tc-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 15px; flex-shrink: 0; }
  .tc-name { font-size: 20px; font-weight: 500; }
  .tc-meta { font-size: 13px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tc-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1rem; }
  .tc-stat { background: var(--bg2); border-radius: var(--radius); padding: .7rem .8rem; text-align: center; }
  .tc-stat .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
  .tc-stat .val { font-size: 18px; font-weight: 500; }
  .tc-gh { font-size: 13px; font-weight: 500; color: var(--text2); margin: .75rem 0 .5rem; display: flex; align-items: center; gap: 8px; }
  .result-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .rw { background: #eaf3de; color: #3b6d11; }
  .rl { background: #fcebeb; color: #a32d2d; }
  .rt { background: #f1efe8; color: #5f5e5a; }
  .tc-gr { display: grid; grid-template-columns: 80px 1fr 40px 1fr 28px; gap: 6px; align-items: center; padding: 8px 0; border-bottom: .5px solid var(--border); font-size: 13px; }
  .tc-gr:last-child { border-bottom: none; }
  .upc-row { display: grid; grid-template-columns: 80px 1fr auto 80px; gap: 6px; align-items: center; padding: 8px 0; border-bottom: .5px solid var(--border); font-size: 13px; }
  .upc-row:last-child { border-bottom: none; }
  .opp-row { display: grid; grid-template-columns: 1fr 60px 60px 60px; gap: 6px; align-items: center; padding: 7px 0; border-bottom: .5px solid var(--border); font-size: 13px; }
  .opp-row:last-child { border-bottom: none; }

  #loading { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  #error-msg { background: #fcebeb; color: #791f1f; border-radius: var(--radius); padding: 1rem; font-size: 14px; margin-top: 1rem; }
  .updated-note { font-size: 11px; color: var(--text3); margin-top: 1rem; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .game-row { grid-template-columns: 70px 1fr 30px 1fr 60px; font-size: 12px; }
    table.t { font-size: 12px; }
  }
</style>
</head>
<body>

<div id="loading">Loading standings…</div>
<div id="error-msg" style="display:none"></div>
<div id="app" style="display:none">
  <div id="main-view"></div>
  <div id="detail-view" style="display:none"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const DIV_COLORS = {
  Skenes:   { pill: "ds", hex: "#185FA5" },
  Skubal:   { pill: "dk", hex: "#0F6E56" },
  Yamamoto: { pill: "dy", hex: "#534AB7" },
};
const AVATAR_C = [
  ["#E6F1FB","#0C447C"],["#E1F5EE","#085041"],["#FAEEDA","#633806"],
  ["#EEEDFE","#3C3489"],["#FAECE7","#712B13"],["#EAF3DE","#27500A"],
  ["#FBEAF0","#72243E"],["#FCEBEB","#791F1F"],["#F1EFE8","#444441"],
];

// ── State ────────────────────────────────────────────────────────────────────
let RAW = {};           // loaded from standings.json
let updatedAt = "";
let topTab = "standings";
let curDiv = "Skenes";
let stdSort = { col: "place", dir: 1 };
let prSort  = { col: "prRank", dir: 1 };
let schedView = "all";
let teamFilter = "all";
let chartInst = null;

// ── Bootstrap ────────────────────────────────────────────────────────────────
fetch("standings.json")
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    RAW = data.divisions;
    updatedAt = data.updated || "";
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    // Default to first division present
    curDiv = Object.keys(RAW)[0] || "Skenes";
    renderMain();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.textContent = `Could not load standings.json — ${err.message}. If you're viewing this locally, run a local server (e.g. python -m http.server 8000) rather than opening the file directly.`;
  });

// ── Utilities ────────────────────────────────────────────────────────────────
function ac(n) {
  const i = Math.abs(n.split("").reduce((a,c) => a + c.charCodeAt(0), 0)) % AVATAR_C.length;
  return AVATAR_C[i];
}
function ini(n) { return n.split(" ").slice(0,2).map(w => w[0]).join("").toUpperCase(); }
function diffFmt(d) { return d > 0 ? "+" + d.toFixed(1) : d.toFixed(1); }
function diffCls(d) { return d > 0 ? "dp" : d < 0 ? "dn" : "dz"; }
function pb(p) {
  if (p === 1) return `<span class="pb p1">1</span>`;
  if (p === 2) return `<span class="pb p2">2</span>`;
  if (p === 3) return `<span class="pb p3">3</span>`;
  return `<span class="pb pn">${p}</span>`;
}
function arrow(col, s) { return s.col === col ? (s.dir === 1 ? "↑" : "↓") : ""; }
function th(col, label, w, s, fn) {
  return `<th style="width:${w};text-align:center" class="${s.col===col?"s":""}" onclick="${fn}('${col}')">${label} ${arrow(col,s)}</th>`;
}
function thL(col, label, w, s, fn) {
  return `<th style="width:${w};text-align:left" class="${s.col===col?"s":""} l" onclick="${fn}('${col}')">${label} ${arrow(col,s)}</th>`;
}
function tierLabel(r) {
  if (r >= 3) return { label: "Elite",      cls: "t1" };
  if (r >= 1) return { label: "Contender",  cls: "t2" };
  if (r >=-1) return { label: "Fringe",     cls: "t3" };
  return              { label: "Rebuilding", cls: "t4" };
}

// ── Analytics ────────────────────────────────────────────────────────────────
function computeRunStats() {
  const stats = {};
  Object.entries(RAW).forEach(([div, data]) => {
    data.standings.forEach(t => { stats[t.team] = { rf: 0, ra: 0, gp: 0, div }; });
    data.games.forEach(g => {
      if (g.awayScore == null) return;
      if (stats[g.away]) { stats[g.away].rf += g.awayScore; stats[g.away].ra += g.homeScore; stats[g.away].gp++; }
      if (stats[g.home]) { stats[g.home].rf += g.homeScore; stats[g.home].ra += g.awayScore; stats[g.home].gp++; }
    });
  });
  return stats;
}

function buildOpponentMap() {
  const opps = {};
  Object.values(RAW).forEach(data => {
    data.standings.forEach(t => { opps[t.team] = []; });
    data.games.forEach(g => {
      if (g.awayScore == null) return;
      opps[g.away]?.push(g.home);
      opps[g.home]?.push(g.away);
    });
  });
  return opps;
}

function computePowerRatings() {
  const rs = computeRunStats();
  const opps = buildOpponentMap();
  const all = Object.keys(rs);
  const ratings = {};
  all.forEach(t => {
    const gp = rs[t].gp || 1;
    ratings[t] = Math.max(-8, Math.min(8, (rs[t].rf - rs[t].ra) / gp));
  });
  for (let i = 0; i < 30; i++) {
    const next = {};
    all.forEach(t => {
      const gp = rs[t].gp || 1;
      const raw = (rs[t].rf - rs[t].ra) / gp;
      const list = opps[t] || [];
      const sos = list.length ? list.reduce((s,o) => s + (ratings[o]||0), 0) / list.length : 0;
      next[t] = Math.max(-10, Math.min(10, raw * 0.7 + sos * 0.3));
    });
    all.forEach(t => { ratings[t] = next[t]; });
  }
  return ratings;
}

function buildAllTeams() {
  const rs = computeRunStats();
  const ratings = computePowerRatings();
  const opps = buildOpponentMap();
  const sos = {};
  Object.keys(opps).forEach(t => {
    const list = opps[t];
    sos[t] = list.length ? list.reduce((s,o) => s + (ratings[o]||0), 0) / list.length : 0;
  });
  const all = [];
  Object.entries(RAW).forEach(([div, data]) => {
    data.standings.forEach(t => {
      const rf = rs[t.team]?.rf || 0, ra = rs[t.team]?.ra || 0, gp = rs[t.team]?.gp || 1;
      all.push({
        team: t.team, div, place: t.place, w: t.w, l: t.l, t: t.t, gp: t.gp,
        pct: parseFloat(t.pct), streak: t.streak, coach: t.coach,
        rf, ra, diff: rf - ra, diffPerGame: (rf - ra) / gp,
        rating: ratings[t.team] || 0, sos: sos[t.team] || 0,
        opponents: opps[t.team] || [],
      });
    });
  });
  all.sort((a, b) => b.rating - a.rating);
  all.forEach((t, i) => { t.prRank = i + 1; });
  return all;
}

// ── Render: main layout ───────────────────────────────────────────────────────
function renderMain() {
  const allTeams = buildAllTeams();
  const allGames = Object.values(RAW).flatMap(d => d.games).filter(g => g.awayScore != null);
  const totalGP = allGames.length;
  const totalRuns = allGames.reduce((s, g) => s + g.awayScore + g.homeScore, 0);
  const divNames = Object.keys(RAW);
  const updatedStr = updatedAt
    ? new Date(updatedAt).toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" })
    : "";

  let html = `
    <h1>7u Midget Baseball</h1>
    <p class="subtitle">SBMSA · Spring '26 · ${divNames.join(" · ")}</p>
    <div class="stats-row">
      <div class="sc"><div class="lbl">Divisions</div><div class="val">${divNames.length}</div></div>
      <div class="sc"><div class="lbl">Teams</div><div class="val">${Object.values(RAW).reduce((s,d)=>s+d.standings.length,0)}</div></div>
      <div class="sc"><div class="lbl">Games played</div><div class="val">${totalGP}</div></div>
      <div class="sc"><div class="lbl">Runs scored</div><div class="val">${totalRuns.toLocaleString()}</div></div>
    </div>
    <div class="top-tabs">
      <button class="top-tab ${topTab==="standings"?"active":""}" onclick="setTopTab('standings')">Standings</button>
      <button class="top-tab ${topTab==="power"?"active":""}" onclick="setTopTab('power')">Power rankings</button>
    </div>
  `;

  html += topTab === "standings" ? renderStandingsTab(allTeams) : renderPowerTab(allTeams);
  if (updatedStr) {
    html += `<p class="updated-note">Data last updated ${updatedStr} UTC</p>`;
  }

  document.getElementById("main-view").innerHTML = html;
  document.getElementById("detail-view").style.display = "none";
  document.getElementById("main-view").style.display = "block";
  if (topTab === "power") drawChart(allTeams);
}

// ── Render: standings tab ─────────────────────────────────────────────────────
function renderStandingsTab(allTeams) {
  const divData = RAW[curDiv];
  if (!divData) return "<p>No data available.</p>";
  const rs = computeRunStats();
  const ratingsMap = allTeams.reduce((m,t) => { m[t.team] = t; return m; }, {});

  let rows = [...divData.standings].map(t => {
    const rt = ratingsMap[t.team] || {};
    return { ...t, rf: rs[t.team]?.rf||0, ra: rs[t.team]?.ra||0, diff: (rs[t.team]?.rf||0)-(rs[t.team]?.ra||0), rating: rt.rating||0, prRank: rt.prRank||"–", sos: rt.sos||0 };
  }).sort((a, b) => {
    let va = a[stdSort.col], vb = b[stdSort.col];
    if (["pct","gb","rating","sos"].includes(stdSort.col)) { va = parseFloat(va)||0; vb = parseFloat(vb)||0; }
    if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return va < vb ? -stdSort.dir : va > vb ? stdSort.dir : 0;
  });

  const teams = divData.standings.map(t => t.team).sort();
  let filtered = divData.games;
  if (teamFilter !== "all") filtered = filtered.filter(g => g.away === teamFilter || g.home === teamFilter);
  if (schedView === "results")  filtered = filtered.filter(g => g.awayScore != null);
  if (schedView === "upcoming") filtered = filtered.filter(g => g.awayScore == null);
  const byWeek = {};
  filtered.forEach(g => { if (!byWeek[g.week]) byWeek[g.week] = []; byWeek[g.week].push(g); });

  let sched = "";
  if (!filtered.length) { sched = '<p style="font-size:13px;color:var(--text2);padding:.75rem 0">No games match the filter.</p>'; }
  else {
    Object.keys(byWeek).sort((a,b) => +a - +b).forEach(wk => {
      sched += `<div class="week-hdr">Week ${wk}</div>`;
      byWeek[wk].forEach(g => {
        const played = g.awayScore != null, aw = played && g.awayScore > g.homeScore, hw = played && g.homeScore > g.awayScore;
        sched += `<div class="game-row">
          <div><div class="gtime">${g.time}</div><div class="gdate">${g.date}</div></div>
          <div style="text-align:right;font-weight:${aw?"500":"400"}">${g.away}</div>
          <div>${played ? `<div class="gscore">${g.awayScore}–${g.homeScore}</div>` : `<div class="gpend">vs</div>`}</div>
          <div style="font-weight:${hw?"500":"400"}">${g.home}</div>
          <div class="gloc">${g.field}</div>
        </div>`;
      });
    });
  }

  return `
    <div class="div-tabs">${Object.keys(RAW).map(d => `<button class="div-tab ${d===curDiv?"active":""}" onclick="setCurDiv('${d}')">${d}</button>`).join("")}</div>
    <div class="sec-label">Standings — ${curDiv} division · click a team name for their card</div>
    <div class="tbl-wrap"><table class="t">
      <thead><tr>
        ${th("place","#","32px",stdSort,"stdSortBy")}
        ${thL("team","Team","auto",stdSort,"stdSortBy")}
        ${th("w","W","34px",stdSort,"stdSortBy")}
        ${th("l","L","34px",stdSort,"stdSortBy")}
        ${th("t","T","34px",stdSort,"stdSortBy")}
        ${th("pct","PCT","50px",stdSort,"stdSortBy")}
        ${th("gp","GP","34px",stdSort,"stdSortBy")}
        ${th("gb","GB","34px",stdSort,"stdSortBy")}
        ${th("rf","RF","38px",stdSort,"stdSortBy")}
        ${th("ra","RA","38px",stdSort,"stdSortBy")}
        ${th("diff","DIFF","46px",stdSort,"stdSortBy")}
        ${th("rating","PWR","46px",stdSort,"stdSortBy")}
        ${th("prRank","#PR","40px",stdSort,"stdSortBy")}
        ${th("streak","Streak","72px",stdSort,"stdSortBy")}
        <th style="width:76px;text-align:left" class="l">Coach</th>
      </tr></thead>
      <tbody>${rows.map(t => {
        const dc = diffCls(t.diff);
        return `<tr>
          <td>${pb(t.place)}</td>
          <td class="l"><span class="tlink" onclick="openTeamCard('${curDiv}','${t.team.replace(/'/g,"\\'")}',false)">${t.team}</span></td>
          <td>${t.w}</td><td>${t.l}</td><td>${t.t}</td><td>${t.pct}</td><td>${t.gp}</td><td>${t.gb}</td>
          <td>${t.rf}</td><td>${t.ra}</td>
          <td class="${dc}">${t.diff > 0 ? "+" + t.diff : t.diff}</td>
          <td style="font-weight:500">${t.rating.toFixed(1)}</td>
          <td style="font-size:12px;color:var(--text2)">#${t.prRank}</td>
          <td class="${t.streak.startsWith("Won")?"sw":"sl"}">${t.streak}</td>
          <td class="l" style="font-size:12px;color:var(--text2)">${t.coach}</td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
    <div class="sec-label" style="margin-top:2rem">Schedule — ${curDiv} division</div>
    <div class="filter-row">
      <label>Team:</label>
      <select onchange="setTeamFilter(this.value)">
        <option value="all">All teams</option>
        ${teams.map(t => `<option value="${t}" ${teamFilter===t?"selected":""}>${t}</option>`).join("")}
      </select>
      <label style="margin-left:8px">Show:</label>
      <select onchange="setSchedView(this.value)">
        <option value="all" ${schedView==="all"?"selected":""}>All games</option>
        <option value="results" ${schedView==="results"?"selected":""}>Results</option>
        <option value="upcoming" ${schedView==="upcoming"?"selected":""}>Upcoming</option>
      </select>
    </div>
    ${sched}
  `;
}

// ── Render: power tab ─────────────────────────────────────────────────────────
function renderPowerTab(allTeams) {
  let sorted = [...allTeams].sort((a, b) => {
    let va = a[prSort.col], vb = b[prSort.col];
    if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return va < vb ? -prSort.dir : va > vb ? prSort.dir : 0;
  });

  return `
    <div class="info-box">
      <strong>Power rating</strong> starts from each team's run differential per game, then iteratively adjusts for opponent quality using a 30-pass convergence (Simple Rating System). <strong>SOS</strong> is the average power rating of all opponents faced.
      Tiers: <span class="tier-badge t1">Elite</span> ≥ +3 &nbsp;
             <span class="tier-badge t2">Contender</span> +1 to +3 &nbsp;
             <span class="tier-badge t3">Fringe</span> −1 to +1 &nbsp;
             <span class="tier-badge t4">Rebuilding</span> below −1
    </div>
    <div class="sec-label">Rating bar chart — all ${allTeams.length} teams</div>
    <div style="position:relative;width:100%;height:${allTeams.length*28+60}px;margin-bottom:1.5rem">
      <canvas id="prChart" role="img" aria-label="Horizontal bar chart of power ratings for all ${allTeams.length} teams.">Power ratings for all teams.</canvas>
    </div>
    <div class="sec-label">Full power rankings · click a team for their breakdown</div>
    <div class="tbl-wrap"><table class="t">
      <thead><tr>
        ${th("prRank","Rank","44px",prSort,"prSortBy")}
        ${thL("team","Team","auto",prSort,"prSortBy")}
        <th style="width:74px;text-align:left" class="l">Division</th>
        ${th("rating","Rating","54px",prSort,"prSortBy")}
        ${th("sos","SOS","54px",prSort,"prSortBy")}
        ${th("w","W","34px",prSort,"prSortBy")}
        ${th("l","L","34px",prSort,"prSortBy")}
        ${th("pct","PCT","50px",prSort,"prSortBy")}
        ${th("diffPerGame","RD/G","50px",prSort,"prSortBy")}
        <th style="width:82px;text-align:center">Tier</th>
      </tr></thead>
      <tbody>${sorted.map(t => {
        const tier = tierLabel(t.rating);
        return `<tr>
          <td style="font-weight:500">${pb(t.prRank)}</td>
          <td class="l"><span class="tlink" onclick="openTeamCard('${t.div}','${t.team.replace(/'/g,"\\'")}',true)">${t.team}</span></td>
          <td class="l"><span class="div-pill ${DIV_COLORS[t.div]?.pill||"ds"}">${t.div}</span></td>
          <td style="font-weight:500;color:${t.rating>=0?"#3b6d11":"#a32d2d"}">${t.rating.toFixed(2)}</td>
          <td style="color:var(--text2)">${t.sos.toFixed(2)}</td>
          <td>${t.w}</td><td>${t.l}</td><td>${t.pct.toFixed(3)}</td>
          <td class="${diffCls(t.diffPerGame)}">${diffFmt(t.diffPerGame)}</td>
          <td><span class="tier-badge ${tier.cls}">${tier.label}</span></td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
  `;
}

function drawChart(allTeams) {
  const sorted = [...allTeams].sort((a,b) => a.rating - b.rating);
  const canvas = document.getElementById("prChart");
  if (!canvas) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(canvas, {
    type: "bar",
    data: {
      labels: sorted.map(t => `#${t.prRank} ${t.team}`),
      datasets: [{
        label: "Power rating",
        data: sorted.map(t => parseFloat(t.rating.toFixed(2))),
        backgroundColor: sorted.map(t => (DIV_COLORS[t.div]?.hex || "#185FA5") + "cc"),
        borderColor:     sorted.map(t =>  DIV_COLORS[t.div]?.hex || "#185FA5"),
        borderWidth: 1, borderRadius: 3,
      }],
    },
    options: {
      indexAxis: "y", responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `Rating: ${ctx.raw.toFixed(2)}` } } },
      scales: {
        x: { grid: { color: "rgba(128,128,128,0.1)" }, ticks: { color: "#888780", font: { size: 11 } }, border: { color: "rgba(128,128,128,0.2)" } },
        y: { ticks: { color: "#888780", font: { size: 11 } }, grid: { display: false }, border: { display: false } },
      },
    },
  });
}

// ── Render: team card ─────────────────────────────────────────────────────────
function openTeamCard(divName, teamName, fromPR) {
  const allTeams = buildAllTeams();
  const tdata = RAW[divName]?.standings.find(t => t.team === teamName);
  const tr = allTeams.find(t => t.team === teamName);
  if (!tdata || !tr) return;
  const allGames = RAW[divName].games.filter(g => g.away === teamName || g.home === teamName);
  const played = allGames.filter(g => g.awayScore != null);
  const upcoming = allGames.filter(g => g.awayScore == null);
  const [bg, fg] = ac(teamName);
  const tier = tierLabel(tr.rating);

  const oppCounts = {};
  tr.opponents.forEach(o => { oppCounts[o] = (oppCounts[o]||0) + 1; });
  let oppRows = [...new Set(tr.opponents)].map(opp => {
    const ot = allTeams.find(t => t.team === opp);
    if (!ot) return "";
    return `<div class="opp-row">
      <div style="display:flex;align-items:center;gap:8px"><span class="div-pill ${DIV_COLORS[ot.div]?.pill||"ds"}" style="font-size:10px">${ot.div}</span><span>${opp}</span></div>
      <div style="text-align:center;color:var(--text2);font-size:12px">${oppCounts[opp]}x</div>
      <div style="text-align:center;font-weight:500;font-size:13px;color:${ot.rating>=0?"#3b6d11":"#a32d2d"}">${ot.rating.toFixed(2)}</div>
      <div style="text-align:right"><span class="tier-badge ${tierLabel(ot.rating).cls}">${tierLabel(ot.rating).label}</span></div>
    </div>`;
  }).join("") || "<p style='font-size:13px;color:var(--text2);padding:.75rem 0'>No opponents yet.</p>";

  let resultsHtml = played.length ? played.map(g => {
    const isAway = g.away === teamName;
    const myScore = isAway ? g.awayScore : g.homeScore;
    const oppScore = isAway ? g.homeScore : g.awayScore;
    const opp = isAway ? g.home : g.away;
    const result = myScore > oppScore ? "W" : myScore < oppScore ? "L" : "T";
    const ot = allTeams.find(t => t.team === opp);
    return `<div class="tc-gr">
      <div style="font-size:12px;color:var(--text2)">${g.date}</div>
      <div style="font-size:13px;color:var(--text2)">${isAway?"@ ":"vs "}<span style="color:var(--text)">${opp}</span>${ot?` <span style="font-size:11px;color:var(--text2)">(${ot.rating.toFixed(1)})</span>`:""}</div>
      <div style="text-align:center;font-size:14px;font-weight:500">${myScore}–${oppScore}</div>
      <div style="font-size:11px;color:var(--text2)">${g.field}</div>
      <div style="text-align:right"><span class="result-pill ${result==="W"?"rw":result==="L"?"rl":"rt"}">${result}</span></div>
    </div>`;
  }).join("") : "<p style='font-size:13px;color:var(--text2);padding:.75rem 0'>No results yet.</p>";

  let upcomingHtml = upcoming.length ? upcoming.map(g => {
    const isAway = g.away === teamName;
    const opp = isAway ? g.home : g.away;
    const ot = allTeams.find(t => t.team === opp);
    return `<div class="upc-row">
      <div style="font-size:12px;color:var(--text2)">${g.date}</div>
      <div style="font-size:13px;color:var(--text2)">${isAway?"@ ":"vs "}<span style="color:var(--text)">${opp}</span>${ot?` <span style="font-size:11px;color:var(--text2)">(${ot.rating.toFixed(1)})</span>`:""}</div>
      <div style="font-size:12px;color:var(--text2)">${g.time}</div>
      <div style="font-size:11px;color:var(--text2);text-align:right">${g.field}</div>
    </div>`;
  }).join("") : "<p style='font-size:13px;color:var(--text2);padding:.75rem 0'>No remaining games.</p>";

  const backFn = fromPR ? "setTopTab('power')" : `setCurDiv('${divName}')`;
  const backLabel = fromPR ? "Back to power rankings" : `Back to ${divName} standings`;

  document.getElementById("main-view").style.display = "none";
  document.getElementById("detail-view").style.display = "block";
  document.getElementById("detail-view").innerHTML = `
    <div class="team-card">
      <button class="tc-back" onclick="${backFn}">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="width:16px;height:16px"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${backLabel}
      </button>
      <div class="tc-header">
        <div class="tc-avatar" style="background:${bg};color:${fg}">${ini(teamName)}</div>
        <div>
          <div class="tc-name">${teamName}</div>
          <div class="tc-meta">
            <span class="div-pill ${DIV_COLORS[divName]?.pill||"ds"}">${divName}</span>
            <span>#${tdata.place} in division · Coach ${tdata.coach}</span>
            <span class="tier-badge ${tier.cls}">${tier.label}</span>
          </div>
        </div>
      </div>
      <div class="tc-stats">
        <div class="tc-stat"><div class="lbl">W</div><div class="val">${tdata.w}</div></div>
        <div class="tc-stat"><div class="lbl">L</div><div class="val">${tdata.l}</div></div>
        <div class="tc-stat"><div class="lbl">T</div><div class="val">${tdata.t}</div></div>
        <div class="tc-stat"><div class="lbl">PCT</div><div class="val">${tdata.pct}</div></div>
        <div class="tc-stat"><div class="lbl">GB</div><div class="val">${tdata.gb}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem">
        <div class="tc-stat"><div class="lbl">Runs for</div><div class="val">${tr.rf}</div></div>
        <div class="tc-stat"><div class="lbl">Runs allowed</div><div class="val">${tr.ra}</div></div>
        <div class="tc-stat"><div class="lbl">RD/game</div><div class="val ${diffCls(tr.diffPerGame)}">${diffFmt(tr.diffPerGame)}</div></div>
        <div class="tc-stat"><div class="lbl">SOS</div><div class="val">${tr.sos.toFixed(2)}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem">
        <div class="tc-stat" style="background:var(--bg);border:.5px solid var(--border)">
          <div class="lbl">Power rating</div>
          <div style="font-size:28px;font-weight:500;color:${tr.rating>=0?"#3b6d11":"#a32d2d"};margin-top:4px">${tr.rating.toFixed(2)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">#${tr.prRank} of ${Object.values(RAW).reduce((s,d)=>s+d.standings.length,0)} teams overall</div>
        </div>
        <div class="tc-stat" style="background:var(--bg);border:.5px solid var(--border)">
          <div class="lbl">Strength of schedule</div>
          <div style="font-size:28px;font-weight:500;margin-top:4px">${tr.sos.toFixed(2)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">avg opp rating across ${played.length} games</div>
        </div>
      </div>
      <div class="sec-label">Opponents faced</div>
      <div style="margin-bottom:1rem">
        <div style="display:grid;grid-template-columns:1fr 60px 60px 60px;gap:6px;padding:5px 0;border-bottom:.5px solid var(--border)">
          <div style="font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">Team</div>
          <div style="text-align:center;font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">Games</div>
          <div style="text-align:center;font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">Rating</div>
          <div style="text-align:right;font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">Tier</div>
        </div>
        ${oppRows}
      </div>
      <div class="tc-gh">Results <span style="font-size:12px;font-weight:400;color:var(--text2)">${played.length} game${played.length!==1?"s":""} · opp rating in parentheses</span></div>
      ${resultsHtml}
      <div class="tc-gh" style="margin-top:1rem">Remaining schedule <span style="font-size:12px;font-weight:400;color:var(--text2)">${upcoming.length} game${upcoming.length!==1?"s":""}</span></div>
      ${upcomingHtml}
    </div>
  `;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function setTopTab(t)     { topTab = t; renderMain(); }
function setCurDiv(d)     { curDiv = d; stdSort = { col:"place", dir:1 }; teamFilter="all"; schedView="all"; document.getElementById("detail-view").style.display="none"; renderMain(); }
function stdSortBy(col)   { if (stdSort.col===col) stdSort.dir*=-1; else { stdSort.col=col; stdSort.dir=1; } renderMain(); }
function prSortBy(col)    { if (prSort.col===col)  prSort.dir*=-1;  else { prSort.col=col;  prSort.dir=1;  } renderMain(); }
function setSchedView(v)  { schedView = v; renderMain(); }
function setTeamFilter(v) { teamFilter = v; renderMain(); }
</script>
</body>
</html>
