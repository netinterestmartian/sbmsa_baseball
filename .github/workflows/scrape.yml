name: Daily standings scrape

on:
  schedule:
    # Runs every day at 7:00 AM Central Time (12:00 UTC)
    # Adjust the hour to whatever makes sense for your league's game days
    - cron: "0 12 * * *"

  # Also allow triggering manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit standings.json back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated standings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standings.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update standings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
